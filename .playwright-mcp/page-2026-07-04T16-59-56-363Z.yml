          - heading "Keep the arc, stretch the ease" [level=2] [ref=f6e109]
          - paragraph [ref=f6e110]:
            - text: The shape Figma describes in
            - link "Desperately seeking squircles" [ref=f6e111] [cursor=pointer]:
              - /url: https://www.figma.com/blog/desperately-seeking-squircles/
            - text: "keeps the circular arc, at your radius. What changes is its sweep: 90° with no smoothing, shrinking to"
            - code [ref=f6e112]: 90° · (1 − s)
            - text: as smoothing
            - code [ref=f6e113]: s
            - text: rises, while the run-in from the straight edge stretches to
            - code [ref=f6e114]: (1 + s) · r
            - text: . At 60%, the value Figma equates with iOS, the arc keeps 36° and the ease takes 1.6r of edge on either side. The apex sits exactly on the circle. The radius you chose is the radius you see.
          - paragraph [ref=f6e115]:
            - text: Our transition is one cubic bézier per side, solved in closed form from two constraints. Its first three control points stay collinear on the edge, so the curve leaves the straight line with zero curvature; at the far end its curvature is exactly
            - code [ref=f6e116]: 1/r
            - text: ", the circle's own. Both junctions are curvature-continuous, a step smoother than"
            - code [ref=f6e117]: border-radius
            - text: "itself, which only matches tangents. And the geometry has to answer for itself: property tests hold the apex to the radius circle, check tangency and curvature at every junction, and clamp radius-first when a small element runs out of room. No reference implementation, no parity target."
        - generic [ref=f6e119]:
