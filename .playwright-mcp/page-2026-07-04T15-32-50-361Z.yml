      - generic [ref=f5e33]:
        - paragraph [ref=f5e34]:
          - strong [ref=f5e35]: "@outpacelabs/avatars"
          - text: is a free, open-source React component that renders generative, deterministic mesh-gradient avatars on an HTML canvas. The same seed, whether a user id, email, or username, always produces the same gradient, so you get a stable profile picture with no stored images and no network requests. Zero dependencies, MIT licensed.
        - paragraph [ref=f5e36]:
          - text: Install with
          - code [ref=f5e37]: npm i @outpacelabs/avatars
          - text: ", then render a"
          - code [ref=f5e38]: GradientAvatar
          - text: with any
          - code [ref=f5e39]: seed
          - text: .
        - navigation "Primary" [ref=f5e40]:
          - link "Read the documentation" [ref=f5e41] [cursor=pointer]:
            - /url: /docs
          - link "View source on GitHub" [ref=f5e42] [cursor=pointer]:
            - /url: https://github.com/outpacelabs/avatars
          - link "View the package on npm" [ref=f5e43] [cursor=pointer]:
            - /url: https://www.npmjs.com/package/@outpacelabs/avatars
        - heading "What is @outpacelabs/avatars?" [level=2] [ref=f5e44]
        - paragraph [ref=f5e45]: A zero-dependency React avatar component for generative, colorful gradient profile pictures. Drop in any seed string or number and get a unique, reproducible mesh gradient, ideal for user avatars, placeholder and fallback images, team logos, and brand artwork. Render to a canvas, a PNG data URL, a Blob, or export at 2000×2000.
        - heading "Same seed, same avatar, every time" [level=2] [ref=f5e46]
        - paragraph [ref=f5e47]: Gradients are derived deterministically from the seed, so the same input renders identically across devices and reloads. A user id or email becomes a stable avatar you never have to store or migrate.
        - heading "Zero dependencies, no network" [level=2] [ref=f5e48]
        - paragraph [ref=f5e49]: Everything renders client-side on an HTML canvas. There are no API calls, no stored images, and nothing leaves the user's device, which is great for privacy, offline use, and avoiding third-party requests.
        - heading "A canvas alternative to Boring Avatars and DiceBear" [level=2] [ref=f5e50]
        - paragraph [ref=f5e51]: Most avatar libraries render SVG and many depend on an API. @outpacelabs/avatars renders gradient/mesh fills on canvas with zero dependencies and no network calls, a maintained, privacy-first alternative when you want gradient avatars instead of shapes or illustrations.
        - heading "Frequently asked questions" [level=2] [ref=f5e52]
        - heading "Is @outpacelabs/avatars free?" [level=3] [ref=f5e53]
        - paragraph [ref=f5e54]: Yes. It is free and open source under the MIT license, for commercial or personal projects, with no attribution required.
        - heading "How are the gradients generated?" [level=3] [ref=f5e55]
        - paragraph [ref=f5e56]: Each gradient is derived deterministically from its seed via a hashing function, so the same seed always yields the same gradient. Nothing is stored and no network request is made.
        - heading "Does it make network requests?" [level=3] [ref=f5e57]
        - paragraph [ref=f5e58]: No. Avatars render entirely client-side on an HTML canvas. Nothing is uploaded, hashed to a remote service, or stored, which is good for privacy and offline use.
        - heading "Does it work without React?" [level=3] [ref=f5e59]
        - paragraph [ref=f5e60]: Yes. The bundled engine is re-exported, so you can render gradients to a canvas, data URL, or Blob outside React using helpers like gradientToDataURL and generatePalette.
        - heading "What frameworks does it support?" [level=3] [ref=f5e61]
        - paragraph [ref=f5e62]: Any React 18+ application, including Next.js. React is the only peer dependency.
        - heading "How is it different from Boring Avatars?" [level=3] [ref=f5e63]
        - paragraph [ref=f5e64]: Boring Avatars renders SVG shapes; @outpacelabs/avatars renders gradient/mesh fills on an HTML canvas with zero dependencies and no network requests.
