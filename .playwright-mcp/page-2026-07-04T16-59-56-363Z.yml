        - generic [ref=f6e82]:
          - heading "Every corner has a crease" [level=2] [ref=f6e83]
          - paragraph [ref=f6e84]:
            - code [ref=f6e85]: border-radius
            - text: rounds a corner with a quarter of a circle. The edge runs dead straight, at zero curvature, and at the exact point the arc begins, curvature jumps to
            - code [ref=f6e86]: 1/r
            - text: . Nothing in between. Your eye won't name it, but it reads the jump as a faint crease, the place where one continuous line quietly becomes two.
          - paragraph [ref=f6e87]: Apple has been sanding that crease off for years, on hardware rims, on icons, on the Dynamic Island. Figma shipped the same move as a slider called corner smoothing. The corner stays a corner. The curvature just arrives gradually instead of switching on.
        - generic [ref=f6e89]:
          - heading "The superellipse trap" [level=2] [ref=f6e90]
          - paragraph [ref=f6e91]:
            - text: The first thing everyone reaches for is a superellipse,
            - code [ref=f6e92]: "|x/r|ⁿ + |y/r|ⁿ = 1"
            - text: ", sampled into the corner box. In isolation it looks right: one continuous curve, no crease. It also quietly redraws your design. Inside the same r-by-r box, a superellipse hugs the corner tighter than the circle does, so the apex creeps outward and a 20px radius reads closer to 12. Same number, smaller corner."
          - paragraph [ref=f6e93]: We shipped that version first. Every corner on the site came back squarer, at the same nominal radius. The red outline below is the plain circular arc; watch what each curve does at the apex.
