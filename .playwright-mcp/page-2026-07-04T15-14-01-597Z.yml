      - main [ref=f3e154]:
        - generic [ref=f3e156]:
          - heading "One gesture, played forward or reversed" [level=2] [ref=f3e157]
          - paragraph [ref=f3e158]: "Interfaces already speak in directions. Panels slide in and out, values step up and down, switches flip on and off, flows end in yes or no. The sounds mirror that grammar: every pair is a single gesture, played forward or reversed. Rising pitch opens, affirms, increases. Falling pitch closes, dismisses, declines. Learn one sound and you have learned its opposite."
          - paragraph [ref=f3e159]: "Some states ask for more than a direction, and there the gesture itself carries the meaning. A copy is a strike followed by its own echo, quieter and duller: the duplicate. Paste is the same pair reversed, the ghost arriving first and landing as the real thing. A page turn is air in the direction of travel, then a soft low landing on the new page. Open and close trade the same glide up and down a fourth. And remove is a single dead strike, shorter and drier than deny, because deletion is a completion, not a refusal."
          - paragraph [ref=f3e160]: Just as designed is the silence. Sound earns its place at confirmations and at errors, the moments a user must not miss, and nowhere else. Nothing on hover. Nothing on keystrokes. Anything that fires ten times a second belongs to the pointer, not the ear.
        - generic [ref=f3e162]:
          - heading "The sound design is data" [level=2] [ref=f3e163]
          - paragraph [ref=f3e164]: "There isn't an audio file in this library. A sound is a spec: a handful of numbers naming tones and noise bursts, where they start, how they glide, how loud they peak. Pure functions produce the specs; a small interpreter schedules them onto Web Audio nodes. The drawings in the playground aren't illustrations of the sounds. They are renderings of the same data the engine plays."
          - code [ref=f3e167]:
            - generic [ref=f3e168]: "import { specs, duration } from \"@outpacelabs/audio\";"
            - generic [ref=f3e169]: specs.nudge("up");
            - generic [ref=f3e170]: "// {"
            - generic [ref=f3e171]: "// name: \"nudge-up\","
            - generic [ref=f3e172]: "// layers: [{ kind: \"fm\", from: 500, to: 570, ratio: 2.76,"
            - generic [ref=f3e173]: "// index: 2.5, at: 0, duration: 0.045, peak: 0.5 }],"
            - generic [ref=f3e174]: "// }"
            - generic [ref=f3e175]: duration(specs.confirm()); // 0.089, nothing exceeds 0.18s
          - paragraph [ref=f3e176]: "Data has properties, and properties can be held to. The test suite runs the whole sound design in Node, no AudioContext anywhere: every sound ends inside 180 milliseconds, every mirrored pair actually reverses, the tap stays true percussion, deny stays low and soft. The design cannot drift without a test going red."
          - code [ref=f3e179]:
            - generic [ref=f3e180]: "import { confirm, copy, deny, nudge, turn } from \"@outpacelabs/audio\";"
            - generic [ref=f3e181]: "<Switch onChange={(on) => toggle(on ? \"on\" : \"off\")} />"
            - generic [ref=f3e182]: "<Stepper onStep={(direction) => nudge(direction)} />"
            - generic [ref=f3e183]: navigator.clipboard.writeText(text).then(copy);
            - generic [ref=f3e184]: router.push(next).then(() => turn("forward"));
            - generic [ref=f3e185]: form.submit().then(confirm).catch(deny);
        - generic [ref=f3e187]:
          - heading "A voice from a seed" [level=2] [ref=f3e188]
          - paragraph [ref=f3e189]:
            - text: Our avatars engine turns any seed into a gradient no other seed produces. The same move works on sound.
            - code [ref=f3e190]: setVoice(seed)
            - text: "hashes any string or number into a voice: a register a few semitones up or down, a timbre, a brightness for the percussion, a pace. The whole set re-renders in it. A product can own its sound the way it owns a color, and two products built on this library will not sound like each other."
          - paragraph [ref=f3e191]: "A voice changes how the sounds speak, never what they say. The property tests sample a hundred seeded voices and hold every invariant against each one: pairs still mirror, the tap is still percussion, deny still sits low, nothing runs long."
        - generic [ref=f3e193]:
          - heading "One instrument, struck fifteen ways" [level=2] [ref=f3e194]
          - paragraph [ref=f3e195]: "Every sound here is the same physical event: a strike. A strike has two parts. The contact is a few milliseconds of filtered noise, the touch itself. The body is a two-operator FM tone at a slightly inharmonic ratio, 2.76, the wood and marimba family; integer ratios ring like organs, this rings like an object. The modulation index decays across each strike, so the brightness dies the way a struck object's does. Direction lives in where and how the material is hit, never in a melody. A UI sound that sings reads as a jingle."
          - code [ref=f3e198]:
            - generic [ref=f3e199]: gain.gain.setValueAtTime(0.001, start);
            - generic [ref=f3e200]: gain.gain.linearRampToValueAtTime(peak, start + 0.004);
            - generic [ref=f3e201]: gain.gain.exponentialRampToValueAtTime(0.001, end); // never to zero
          - paragraph [ref=f3e202]: Envelopes ramp exponentially down to 0.001 and never to zero; an exponential cannot reach zero, and a ramp that tries clicks audibly at the end. One AudioContext serves the whole app, created lazily inside the first user gesture so autoplay policy stays satisfied, resumed when the browser suspends it. Every node disconnects itself when its sound ends.
        - generic [ref=f3e204]:
          - heading "Quiet by default" [level=2] [ref=f3e205]
          - paragraph [ref=f3e206]:
            - text: The master volume defaults to 0.3. One call disables everything, the preference persists in
            - code [ref=f3e207]: localStorage
            - text: ", and anyone who asks the OS for reduced motion gets silence without asking twice. Failure informs rather than punishes: deny is a dead strike, low and dull, not a buzzer. The user already knows something went wrong. The sound only has to say it, quietly."
